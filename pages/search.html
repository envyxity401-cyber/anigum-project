<!DOCTYPE html>
<html lang="en">
<head>
<title>Search - AniGum</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c5cfc'/><text x='16' y='23' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif' font-weight='bold'>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--bg2:#0e0e18;--bg3:#13131f;--card:#111120;--card2:#181828;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--accent:#7c5cfc;--accent-dark:#6344e0;--accent-dim:rgba(124,92,252,0.14);--text:#ededf5;--text2:#9090b0;--text3:#55556a;--font:'DM Sans',sans-serif;--font-head:'Syne',sans-serif;--radius:10px;--nav-h:62px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}a{text-decoration:none;color:inherit}img{display:block}button{cursor:pointer;font-family:var(--font)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}@keyframes gradMove{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);background:rgba(9,9,15,0.88);backdrop-filter:blur(22px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1360px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:16px;font-weight:800;color:white}
.logo-name{font-family:var(--font-head);font-size:18px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#f472b6,#2dd4bf,#a78bfa);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradMove 5s ease infinite}
.nav-links{display:flex;gap:2px;list-style:none}
.nav-links a{padding:6px 13px;border-radius:7px;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.2s}
.nav-links a:hover{color:var(--text);background:var(--card)}
.nav-search{margin-left:auto;display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:visible;width:240px;transition:border-color 0.2s;position:relative}
.nav-search:focus-within{border-color:var(--accent)}
.nav-search input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;width:100%}
.nav-search input::placeholder{color:var(--text3)}
.nav-search button{background:none;border:none;color:var(--text2);padding:9px 10px;display:flex;align-items:center;transition:color 0.2s;flex-shrink:0}
.nav-search button:hover{color:var(--accent)}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;padding:4px;flex-shrink:0}
.mobile-menu{display:none;position:fixed;top:var(--nav-h);left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;z-index:999;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{padding:10px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);transition:all 0.2s}
.mobile-menu a:hover{color:var(--text);background:var(--card)}
.page-wrap{max-width:1360px;margin:0 auto;padding:calc(var(--nav-h) + 28px) 20px 60px;animation:fadeIn 0.4s ease}

/* search hero bar */
.search-hero{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:28px}
.search-hero-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:16px}
.search-bar{display:flex;gap:10px;align-items:center}
.search-input-big{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:13px 18px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.search-input-big:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.12)}
.search-btn{background:var(--accent);border:none;color:white;padding:13px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.2s;white-space:nowrap}
.search-btn:hover{background:var(--accent-dark);transform:translateY(-1px)}
.search-filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.sfchip{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.sfchip:hover{color:var(--text);border-color:var(--accent)}
.sfchip.on{background:var(--accent-dim);border-color:var(--accent);color:#c4b5fd}

/* results header */
.results-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.results-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.results-count{font-size:12px;color:var(--text3);font-weight:500}

/* genre quick links */
.genre-section{margin-bottom:32px}
.genre-title{font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.genre-bar{width:3px;height:16px;background:linear-gradient(180deg,var(--accent),#f472b6);border-radius:2px}
.genre-grid{display:flex;flex-wrap:wrap;gap:8px}
.genre-pill{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8px 18px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.22s;display:flex;align-items:center;gap:6px}
.genre-pill:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--text);transform:translateY(-2px)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:16px}
.card{cursor:pointer;border-radius:var(--radius);overflow:hidden;background:var(--card);border:1px solid var(--border);transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.25s,border-color 0.2s;animation:cardIn 0.4s ease both}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 14px 36px rgba(0,0,0,0.45);border-color:rgba(124,92,252,0.35)}
.card-img{position:relative;aspect-ratio:3/4.3;overflow:hidden;background:var(--card2)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.35s ease}
.card:hover .card-img img{transform:scale(1.07)}
.card-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
.card:hover .card-overlay{opacity:1}
.play-circle{width:46px;height:46px;border-radius:50%;background:rgba(124,92,252,0.92);display:flex;align-items:center;justify-content:center;color:white}
.badges{position:absolute;top:6px;left:6px;display:flex;gap:4px;flex-wrap:wrap}
.badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase}
.badge-sub{background:var(--accent);color:white}
.badge-new{background:#ef4444;color:white}
.badge-movie{background:#f59e0b;color:#09090f}
.badge-score{position:absolute;top:6px;right:6px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);color:#fbbf24;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700}
.badge-ep{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.78);color:var(--text);padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600}
.card-body{padding:10px}
.card-name{font-size:12px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:10px;color:var(--text3);margin-top:4px;font-weight:500}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
.skeleton-card{aspect-ratio:3/5.2}
.empty-state{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state .e-icon{font-size:3rem;margin-bottom:12px}
.empty-state p{font-size:14px;margin-top:8px}
.load-more-btn{display:block;margin:28px auto 0;background:var(--card);border:1px solid var(--border2);color:var(--text2);padding:11px 36px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.load-more-btn:hover{background:var(--card2);color:var(--text);border-color:var(--accent)}
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:20px;margin-top:40px}
.footer p{max-width:1360px;margin:0 auto;text-align:center;font-size:11px;color:var(--text3)}
@media(max-width:900px){.nav-links{display:none}.hamburger{display:block}}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px}.nav-search{width:150px}.search-bar{flex-direction:column}.search-input-big,.search-btn{width:100%}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><div class="logo-mark">A</div><span class="logo-name">AniGum</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">home</a></li>
      <li><a href="series.html">tv series</a></li>
      <li><a href="movies.html">movies</a></li>
      <li><a href="popular.html">most popular</a></li>
      <li><a href="airing.html">airing</a></li>
    </ul>
    <div class="nav-search">
      <input type="text" id="navSearchInput" placeholder="search anime..." autocomplete="off">
      <button onclick="doNavSearch()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="../index.html">home</a><a href="series.html">tv series</a><a href="movies.html">movies</a><a href="popular.html">most popular</a><a href="airing.html">airing</a>
</div>

<div class="page-wrap">
  <!-- search hero -->
  <div class="search-hero">
    <div class="search-hero-title">search anime</div>
    <div class="search-bar">
      <input class="search-input-big" type="text" id="mainSearchInput" placeholder="title, genre, studio..." autocomplete="off">
      <button class="search-btn" onclick="doSearch()">search</button>
    </div>
    <div class="search-filters">
      <button class="sfchip on" data-type="">all types</button>
      <button class="sfchip" data-type="tv">tv series</button>
      <button class="sfchip" data-type="movie">movies</button>
      <button class="sfchip" data-type="ova">ova</button>
      <button class="sfchip" data-type="ona">ona</button>
      <button class="sfchip" data-type="special">specials</button>
    </div>
  </div>

  <!-- genre quick links (shown when no query) -->
  <div class="genre-section" id="genreSection">
    <div class="genre-title"><span class="genre-bar"></span>browse by genre</div>
    <div class="genre-grid">
      <button class="genre-pill" onclick="searchGenre('action')">⚔️ action</button>
      <button class="genre-pill" onclick="searchGenre('romance')">💕 romance</button>
      <button class="genre-pill" onclick="searchGenre('comedy')">😂 comedy</button>
      <button class="genre-pill" onclick="searchGenre('fantasy')">🔮 fantasy</button>
      <button class="genre-pill" onclick="searchGenre('isekai')">🗡️ isekai</button>
      <button class="genre-pill" onclick="searchGenre('horror')">👻 horror</button>
      <button class="genre-pill" onclick="searchGenre('sci-fi')">🤖 sci-fi</button>
      <button class="genre-pill" onclick="searchGenre('sports')">🥊 sports</button>
      <button class="genre-pill" onclick="searchGenre('mystery')">🕵️ mystery</button>
      <button class="genre-pill" onclick="searchGenre('supernatural')">⚡ supernatural</button>
      <button class="genre-pill" onclick="searchGenre('drama')">🎭 drama</button>
      <button class="genre-pill" onclick="searchGenre('school')">🏫 school</button>
      <button class="genre-pill" onclick="searchGenre('mecha')">🦾 mecha</button>
      <button class="genre-pill" onclick="searchGenre('slice of life')">🌸 slice of life</button>
      <button class="genre-pill" onclick="searchGenre('psychological')">🧠 psychological</button>
      <button class="genre-pill" onclick="searchGenre('adventure')">🗺️ adventure</button>
    </div>
  </div>

  <!-- results -->
  <div id="resultsSection" style="display:none">
    <div class="results-head">
      <div class="results-title" id="resultsTitle">results</div>
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div class="grid" id="resultsGrid"></div>
    <button class="load-more-btn" id="loadMoreBtn" style="display:none" onclick="loadMore()">load more results</button>
  </div>
</div>

<footer class="footer"><p>© 2026 anigum · all rights reserved</p></footer>
<script>
var currentPage = 1, currentQuery = '', currentType = '', hasMore = false

function doNavSearch() {
  var q = document.getElementById('navSearchInput')
  if (q && q.value.trim()) window.location.href = 'search.html?q=' + encodeURIComponent(q.value.trim())
}
document.getElementById('navSearchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') doNavSearch() })
function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open') }
function goWatch(id) { window.location.href = 'watch.html?id=' + id }

function searchGenre(genre) {
  document.getElementById('mainSearchInput').value = genre
  currentQuery = genre
  currentPage = 1
  runSearch()
}

function doSearch() {
  var q = document.getElementById('mainSearchInput').value.trim()
  if (!q) return
  currentQuery = q
  currentPage = 1
  var url = new URL(window.location.href)
  url.searchParams.set('q', q)
  window.history.pushState(null, '', url)
  runSearch()
}

document.getElementById('mainSearchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch()
})

document.querySelector('.search-filters').addEventListener('click', function(e) {
  var chip = e.target.closest('.sfchip')
  if (!chip) return
  document.querySelectorAll('.sfchip').forEach(function(c) { c.classList.remove('on') })
  chip.classList.add('on')
  currentType = chip.dataset.type
  if (currentQuery) { currentPage = 1; runSearch() }
})

function showSkeletons() {
  var el = document.getElementById('resultsGrid'), h = ''
  for (var i = 0; i < 24; i++) h += '<div class="skeleton skeleton-card"></div>'
  el.innerHTML = h
}

function renderCards(list, append) {
  var el = document.getElementById('resultsGrid')
  if (!list.length && !append) {
    el.innerHTML = '<div class="empty-state"><div class="e-icon">🔍</div><div style="font-size:16px;font-weight:600;color:var(--text2)">no results found</div><p>try a different search term or genre</p></div>'
    return
  }
  var h = list.map(function(a, i) {
    var img = a.images.webp ? a.images.webp.image_url : a.images.jpg.image_url
    return '<div class="card" style="animation-delay:' + (i * 40) + 'ms" onclick="goWatch(' + a.mal_id + ')">'
    + '<div class="card-img"><img src="' + img + '" alt="" loading="lazy" onerror="this.src=\'https://placehold.co/200x300/111120/7c5cfc?text=N/A\'">'
    + '<div class="card-overlay"><div class="play-circle"><svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>'
    + '<div class="badges"><span class="badge badge-sub">sub</span>'
    + (a.airing ? '<span class="badge badge-new">new</span>' : '')
    + (a.type === 'Movie' ? '<span class="badge badge-movie">movie</span>' : '')
    + '</div>'
    + (a.score ? '<span class="badge-score">★ ' + a.score + '</span>' : '')
    + '<span class="badge-ep">' + (a.episodes || '?') + 'ep</span></div>'
    + '<div class="card-body"><div class="card-name">' + (a.title_english || a.title) + '</div>'
    + '<div class="card-meta">' + (a.type || 'TV') + ' · ' + (a.year || '') + '</div></div></div>'
  }).join('')
  if (append) el.innerHTML += h
  else el.innerHTML = h
}

function runSearch() {
  if (!currentQuery) return
  document.getElementById('genreSection').style.display = 'none'
  document.getElementById('resultsSection').style.display = 'block'
  document.getElementById('resultsTitle').textContent = 'results for "' + currentQuery + '"'
  document.getElementById('resultsCount').textContent = 'loading...'
  if (currentPage === 1) showSkeletons()

  var typeParam = currentType ? '&type=' + currentType : ''
  // no popularity filter - all anime searchable including new and less popular ones
  var url = 'https://api.jikan.moe/v4/anime?q=' + encodeURIComponent(currentQuery) + '&page=' + currentPage + '&limit=24&sfw=true' + typeParam

  fetch(url)
    .then(function(r) { return r.json() })
    .then(function(d) {
      var data = d.data || []
      var total = d.pagination && d.pagination.items ? d.pagination.items.total : data.length
      document.getElementById('resultsCount').textContent = total + ' results'
      renderCards(data, currentPage > 1)
      hasMore = d.pagination && d.pagination.has_next_page
      document.getElementById('loadMoreBtn').style.display = hasMore ? 'block' : 'none'
    })
    .catch(function() {
      document.getElementById('resultsGrid').innerHTML = '<div class="empty-state"><div class="e-icon">⚠️</div><p>search failed — api may be rate limited, try again in a moment</p></div>'
    })
}

function loadMore() {
  currentPage++
  var btn = document.getElementById('loadMoreBtn')
  btn.textContent = 'loading...'
  btn.disabled = true
  var typeParam = currentType ? '&type=' + currentType : ''
  fetch('https://api.jikan.moe/v4/anime?q=' + encodeURIComponent(currentQuery) + '&page=' + currentPage + '&limit=24&sfw=true' + typeParam)
    .then(function(r) { return r.json() })
    .then(function(d) {
      var data = d.data || []
      renderCards(data, true)
      hasMore = d.pagination && d.pagination.has_next_page
      btn.textContent = 'load more results'
      btn.disabled = false
      btn.style.display = hasMore ? 'block' : 'none'
    })
    .catch(function() { btn.textContent = 'load more results'; btn.disabled = false })
}

// init from url params
var params = new URLSearchParams(window.location.search)
var initQ = params.get('q')
if (initQ) {
  document.getElementById('mainSearchInput').value = initQ
  currentQuery = initQ
  runSearch()
}
</script>
<script src="../shared.js"></script>
</body>
</html>
