<!DOCTYPE html>
<html lang="en">
<head>
<title>Currently Airing - AniGum</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c5cfc'/><text x='16' y='23' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif' font-weight='bold'>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--bg2:#0e0e18;--bg3:#13131f;--card:#111120;--card2:#181828;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--accent:#7c5cfc;--accent-dark:#6344e0;--accent-dim:rgba(124,92,252,0.14);--pink:#f472b6;--text:#ededf5;--text2:#9090b0;--text3:#55556a;--font:'DM Sans',sans-serif;--font-head:'Syne',sans-serif;--radius:10px;--nav-h:62px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}a{text-decoration:none;color:inherit}img{display:block}button{cursor:pointer;font-family:var(--font)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes gradMove{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);background:rgba(9,9,15,0.88);backdrop-filter:blur(22px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1360px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:16px;font-weight:800;color:white}
.logo-name{font-family:var(--font-head);font-size:18px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#f472b6,#2dd4bf,#a78bfa);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradMove 5s ease infinite}
.nav-links{display:flex;gap:2px;list-style:none}
.nav-links a{padding:6px 13px;border-radius:7px;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.2s}
.nav-links a:hover,.nav-links a.on{color:var(--text);background:var(--card)}
.nav-search{margin-left:auto;display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:visible;width:240px;transition:border-color 0.2s;position:relative}
.nav-search:focus-within{border-color:var(--accent)}
.nav-search input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;width:100%}
.nav-search input::placeholder{color:var(--text3)}
.nav-search button{background:none;border:none;color:var(--text2);padding:9px 10px;display:flex;align-items:center;transition:color 0.2s;flex-shrink:0}
.nav-search button:hover{color:var(--accent)}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;padding:4px;flex-shrink:0}
.mobile-menu{display:none;position:fixed;top:var(--nav-h);left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;z-index:999;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{padding:10px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);transition:all 0.2s}
.mobile-menu a:hover{color:var(--text);background:var(--card)}

.page-wrap{max-width:1360px;margin:0 auto;padding:calc(var(--nav-h) + 28px) 20px 60px;animation:fadeIn 0.4s ease}

/* page header */
.page-head{margin-bottom:28px}
.page-head-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.page-title-wrap{}
.page-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid rgba(124,92,252,0.25);color:#a78bfa;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.live-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 1.5s infinite}
.page-title{font-family:var(--font-head);font-size:28px;font-weight:800;letter-spacing:-0.5px}
.page-sub{font-size:13px;color:var(--text2);margin-top:5px}

/* season selector - the big visual tabs like hianime */
.season-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.season-card{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 20px;border-radius:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all 0.22s;font-family:var(--font);min-width:110px}
.season-card:hover{border-color:var(--accent);color:var(--text);transform:translateY(-2px)}
.season-card.on{background:var(--accent-dim);border-color:var(--accent);color:var(--text)}
.season-card .sc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3)}
.season-card.on .sc-label{color:#a78bfa}
.season-card .sc-name{font-family:var(--font-head);font-size:14px;font-weight:700}
.season-card .sc-year{font-size:11px;color:var(--text3)}
.season-card.on .sc-year{color:#a78bfa}
.season-card .sc-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);margin-top:2px}
.season-card.on .sc-dot{background:#22c55e;animation:pulse 1.5s infinite}

/* type filter chips */
.type-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
.fchip{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.fchip:hover{color:var(--text);border-color:var(--accent)}
.fchip.on{background:rgba(124,92,252,0.15);border-color:var(--accent);color:#c4b5fd}

/* main two-col layout */
.airing-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start}

/* airing list */
.airing-list{display:flex;flex-direction:column;gap:10px}
.airing-item{display:flex;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;text-decoration:none;color:inherit;animation:cardIn 0.4s ease both}
.airing-item:hover{transform:translateX(5px);border-color:rgba(124,92,252,0.35);box-shadow:0 6px 24px rgba(0,0,0,0.35)}
.ai-num{width:28px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text3);flex-shrink:0}
.ai-thumb{width:58px;height:80px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--card2)}
.ai-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
.airing-item:hover .ai-thumb img{transform:scale(1.06)}
.ai-body{flex:1;min-width:0}
.ai-title{font-family:var(--font-head);font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.ai-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;align-items:center}
.ai-tag{background:var(--accent-dim);border:1px solid rgba(124,92,252,0.2);color:#c4b5fd;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.ai-tag-green{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);color:#4ade80}
.ai-tag-orange{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:#fbbf24}
.ai-synopsis{font-size:12px;color:var(--text3);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.55}
.ai-aside{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;min-width:70px}
.ai-score{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.28);color:#fbbf24;font-size:12px;font-weight:700;padding:4px 9px;border-radius:7px;display:flex;align-items:center;gap:3px}
.ai-ep{font-size:11px;color:var(--text3);text-align:right}
.ai-airing-badge{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.25)}

/* load more */
.load-more-btn{display:block;margin:24px auto 0;background:var(--card);border:1px solid var(--border2);color:var(--text2);padding:11px 36px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.load-more-btn:hover{background:var(--card2);color:var(--text);border-color:var(--accent)}
.load-more-btn:disabled{opacity:0.4;cursor:not-allowed}

/* schedule sidebar */
.schedule-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:sticky;top:calc(var(--nav-h) + 14px);max-height:calc(100vh - var(--nav-h) - 28px);display:flex;flex-direction:column}
.schedule-head{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.schedule-title{font-family:var(--font-head);font-size:14px;font-weight:700}
.schedule-live{display:flex;align-items:center;gap:5px;font-size:11px;color:#22c55e;font-weight:600}
.schedule-body{overflow-y:auto;flex:1;padding:6px}
.schedule-body::-webkit-scrollbar{width:4px}
.schedule-body::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
.sched-day{margin-bottom:4px}
.sched-day-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);font-weight:700;padding:8px 10px 4px;display:flex;align-items:center;gap:5px}
.sched-day-label.today{color:#22c55e}
.sched-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;text-decoration:none;color:inherit}
.sched-item:hover{background:var(--bg3)}
.sched-thumb{width:34px;height:46px;border-radius:5px;overflow:hidden;background:var(--card2);flex-shrink:0}
.sched-thumb img{width:100%;height:100%;object-fit:cover}
.sched-info{flex:1;min-width:0}
.sched-title{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-ep{font-size:10px;color:var(--text3);margin-top:2px}
.sched-time{font-size:10px;color:var(--accent);font-weight:600;flex-shrink:0}

/* skeleton */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
.skeleton-item{height:104px;border-radius:12px}

.footer{background:var(--bg2);border-top:1px solid var(--border);padding:20px;margin-top:40px}
.footer p{max-width:1360px;margin:0 auto;text-align:center;font-size:11px;color:var(--text3)}

@media(max-width:1000px){.airing-layout{grid-template-columns:1fr}.schedule-panel{position:static;max-height:400px}}
@media(max-width:900px){.nav-links{display:none}.hamburger{display:block}}
@media(max-width:600px){.nav-search{width:150px}.season-selector{gap:6px}.season-card{min-width:90px;padding:8px 12px}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">
      <div class="logo-mark">A</div>
      <span class="logo-name">AniGum</span>
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">home</a></li>
      <li><a href="series.html">tv series</a></li>
      <li><a href="movies.html">movies</a></li>
      <li><a href="popular.html">most popular</a></li>
      <li><a href="airing.html" class="on">airing</a></li>
    </ul>
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="search anime..." autocomplete="off">
      <button onclick="doSearch()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="../index.html">home</a>
  <a href="series.html">tv series</a>
  <a href="movies.html">movies</a>
  <a href="popular.html">most popular</a>
  <a href="airing.html">airing</a>
</div>

<div class="page-wrap">
  <div class="page-head">
    <div class="page-head-top">
      <div class="page-title-wrap">
        <div class="page-badge"><span class="live-dot"></span> live data</div>
        <h1 class="page-title">currently airing</h1>
        <p class="page-sub" id="pageSub">loading season data...</p>
      </div>
    </div>

    <!-- season selector cards like hianime -->
    <div class="season-selector" id="seasonSelector">
      <!-- built by js so we can show month ranges -->
    </div>

    <!-- type filter chips -->
    <div class="type-filters">
      <button class="fchip on" data-type="all">all types</button>
      <button class="fchip" data-type="TV">tv series</button>
      <button class="fchip" data-type="Movie">movies</button>
      <button class="fchip" data-type="ONA">ona</button>
      <button class="fchip" data-type="OVA">ova</button>
      <button class="fchip" data-type="Special">specials</button>
    </div>
  </div>

  <div class="airing-layout">
    <!-- left: list -->
    <div>
      <div class="airing-list" id="airingList"></div>
      <button class="load-more-btn" id="loadMoreBtn" style="display:none" onclick="loadMore()">load more anime</button>
    </div>

    <!-- right: weekly schedule -->
    <div class="schedule-panel">
      <div class="schedule-head">
        <span class="schedule-title">weekly schedule</span>
        <span class="schedule-live"><span class="live-dot"></span> live</span>
      </div>
      <div class="schedule-body" id="scheduleBody">
        <div style="padding:1.5rem;text-align:center;color:var(--text3);font-size:13px">loading...</div>
      </div>
    </div>
  </div>
</div>

<footer class="footer"><p>© 2026 anigum · all rights reserved · this site does not store any files on its servers</p></footer>

<script>
function doSearch() { var q = document.getElementById('searchInput'); if (q && q.value.trim()) window.location.href = 'search.html?q=' + encodeURIComponent(q.value.trim()) }
document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch() })
function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open') }

// --- state ---
var allData = []
var currentPage = 1
var currentSeason = 'now'
var currentType = 'all'
var hasMore = false

// --- seasons config: each entry has display info + the month range ---
var seasons = [
  { key: 'now',        label: 'now airing', name: 'Spring 2025', months: 'Apr - Jun 2025', dot: true },
  { key: '2025/winter', label: 'winter 2025', name: 'Winter 2025', months: 'Jan - Mar 2025', dot: false },
  { key: '2024/fall',  label: 'fall 2024',   name: 'Fall 2024',   months: 'Oct - Dec 2024', dot: false },
  { key: '2024/summer',label: 'summer 2024', name: 'Summer 2024', months: 'Jul - Sep 2024', dot: false },
  { key: '2024/spring',label: 'spring 2024', name: 'Spring 2024', months: 'Apr - Jun 2024', dot: false },
  { key: '2024/winter',label: 'winter 2024', name: 'Winter 2024', months: 'Jan - Mar 2024', dot: false },
]

function buildSeasonSelector() {
  var el = document.getElementById('seasonSelector')
  el.innerHTML = seasons.map(function(s) {
    var isOn = s.key === currentSeason
    return '<button class="season-card' + (isOn ? ' on' : '') + '" data-season="' + s.key + '">'
    + '<span class="sc-label">' + s.label + '</span>'
    + '<span class="sc-name">' + s.name.split(' ')[0] + '</span>'
    + '<span class="sc-year">' + s.months + '</span>'
    + '<span class="sc-dot"></span>'
    + '</button>'
  }).join('')
}

buildSeasonSelector()

document.getElementById('seasonSelector').addEventListener('click', function(e) {
  var btn = e.target.closest('.season-card')
  if (!btn) return
  currentSeason = btn.dataset.season
  currentPage = 1
  allData = []
  buildSeasonSelector()
  showSkeletons()
  fetchData()
})

// --- type filter ---
document.querySelector('.type-filters').addEventListener('click', function(e) {
  var chip = e.target.closest('.fchip')
  if (!chip) return
  document.querySelectorAll('.fchip').forEach(function(c) { c.classList.remove('on') })
  chip.classList.add('on')
  currentType = chip.dataset.type
  renderList()
})

function showSkeletons() {
  var el = document.getElementById('airingList'), h = ''
  for (var i = 0; i < 12; i++) h += '<div class="skeleton skeleton-item"></div>'
  el.innerHTML = h
}

function getFiltered() {
  if (currentType === 'all') return allData
  return allData.filter(function(a) { return a.type === currentType })
}

function renderList() {
  var list = getFiltered()
  var el = document.getElementById('airingList')
  if (!list.length) {
    el.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--text3)">no anime found for this filter</div>'
    return
  }
  el.innerHTML = list.map(function(a, i) {
    var img = a.images.webp ? a.images.webp.image_url : a.images.jpg.image_url
    var title = a.title_english || a.title
    var synopsis = a.synopsis ? a.synopsis.replace(/\[Written by.*?\]/g, '').trim().slice(0, 130) + '...' : ''
    var season = a.season ? a.season + ' ' + (a.year || '') : (a.year || '')
    var broadcastDay = a.broadcast && a.broadcast.day ? a.broadcast.day : null
    var broadcastTime = a.broadcast && a.broadcast.time ? a.broadcast.time + ' JST' : null

    var tags = '<span class="ai-tag">' + (a.type || 'TV') + '</span>'
    if (a.airing) tags += '<span class="ai-tag-green">airing</span>'
    if (a.genres && a.genres.length) tags += '<span class="ai-tag">' + a.genres[0].name + '</span>'
    if (season) tags += '<span class="ai-tag">' + season + '</span>'
    if (broadcastDay) tags += '<span class="ai-tag-orange">' + broadcastDay + (broadcastTime ? ' ' + broadcastTime : '') + '</span>'

    return '<a class="airing-item" style="animation-delay:' + (i * 35) + 'ms" href="watch.html?id=' + a.mal_id + '">'
    + '<div class="ai-num">' + (i + 1) + '</div>'
    + '<div class="ai-thumb"><img src="' + img + '" alt="" loading="lazy"></div>'
    + '<div class="ai-body">'
    + '<div class="ai-title">' + title + '</div>'
    + '<div class="ai-meta">' + tags + '</div>'
    + '<div class="ai-synopsis">' + synopsis + '</div>'
    + '</div>'
    + '<div class="ai-aside">'
    + (a.score ? '<div class="ai-score">★ ' + a.score + '</div>' : '')
    + '<div class="ai-ep">' + (a.episodes ? a.episodes + ' eps' : 'ongoing') + '</div>'
    + (a.airing ? '<div class="ai-airing-badge">live</div>' : '')
    + '</div>'
    + '</a>'
  }).join('')
}

function buildSchedule(list) {
  var days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday']
  var today = days[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1]
  var buckets = {}
  days.forEach(function(d) { buckets[d] = [] })
  list.forEach(function(a) {
    var bd = a.broadcast && a.broadcast.day ? a.broadcast.day.toLowerCase() : null
    var day = bd ? days.find(function(d) { return bd.includes(d) }) : null
    if (day) buckets[day].push(a)
  })
  var el = document.getElementById('scheduleBody')
  var html = days.map(function(day) {
    var items = buckets[day]
    if (!items.length) return ''
    var isToday = day === today
    return '<div class="sched-day">'
    + '<div class="sched-day-label ' + (isToday ? 'today' : '') + '">'
    + (isToday ? '<span class="live-dot"></span>' : '') + day + (isToday ? ' — today' : '') + '</div>'
    + items.slice(0, 6).map(function(a) {
      var img = a.images.webp ? a.images.webp.image_url : a.images.jpg.image_url
      var time = a.broadcast && a.broadcast.time ? a.broadcast.time + ' jst' : '—'
      return '<a class="sched-item" href="watch.html?id=' + a.mal_id + '">'
      + '<div class="sched-thumb"><img src="' + img + '" alt="" loading="lazy"></div>'
      + '<div class="sched-info"><div class="sched-title">' + (a.title_english || a.title) + '</div>'
      + '<div class="sched-ep">' + (a.episodes ? a.episodes + ' eps' : 'ongoing') + '</div></div>'
      + '<div class="sched-time">' + time + '</div>'
      + '</a>'
    }).join('')
    + '</div>'
  }).join('')
  el.innerHTML = html || '<div style="padding:1rem;text-align:center;color:var(--text3);font-size:12px">no schedule data for this season</div>'
}

function fetchData() {
  var url
  if (currentSeason === 'now') {
    url = 'https://api.jikan.moe/v4/seasons/now?page=' + currentPage + '&limit=25&sfw=true'
  } else {
    url = 'https://api.jikan.moe/v4/seasons/' + currentSeason + '?page=' + currentPage + '&limit=25&sfw=true'
  }

  fetch(url)
    .then(function(r) { return r.json() })
    .then(function(d) {
      // no popularity filter - shows all anime including newly airing
      var data = d.data || []
      allData = currentPage === 1 ? data : allData.concat(data)
      hasMore = d.pagination && d.pagination.has_next_page

      var season = seasons.find(function(s) { return s.key === currentSeason })
      var seasonName = season ? season.name : 'this season'
      document.getElementById('pageSub').textContent = seasonName + ' · ' + allData.length + ' anime' + (hasMore ? '+' : '')

      renderList()
      buildSchedule(allData)
      document.getElementById('loadMoreBtn').style.display = hasMore ? 'block' : 'none'
    })
    .catch(function() {
      document.getElementById('airingList').innerHTML = '<div style="padding:3rem;text-align:center;color:var(--text3)">failed to load — api may be rate limited, refresh in a moment</div>'
    })
}

function loadMore() {
  currentPage++
  var btn = document.getElementById('loadMoreBtn')
  btn.textContent = 'loading...'
  btn.disabled = true
  fetch((currentSeason === 'now'
    ? 'https://api.jikan.moe/v4/seasons/now?page='
    : 'https://api.jikan.moe/v4/seasons/' + currentSeason + '?page=')
    + currentPage + '&limit=25&sfw=true')
    .then(function(r) { return r.json() })
    .then(function(d) {
      var data = d.data || []
      allData = allData.concat(data)
      hasMore = d.pagination && d.pagination.has_next_page
      renderList()
      btn.textContent = 'load more anime'
      btn.disabled = false
      btn.style.display = hasMore ? 'block' : 'none'
    })
    .catch(function() { btn.textContent = 'load more anime'; btn.disabled = false })
}

showSkeletons()
fetchData()
</script>
<script src="../shared.js"></script>
</body>
</html>
